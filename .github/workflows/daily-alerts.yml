name: Daily NGX Alerts

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-signals:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🔧 FIX: Added yfinance to the installation list
    - name: Install dependencies
      run: |
        pip install pandas numpy requests yfinance

    # 🔍 Verification Step (Safe)
    - name: Verify GitHub Secrets
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "=== SECRET VERIFICATION ==="
        if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "❌ TELEGRAM_BOT_TOKEN is MISSING"
        else
          echo "✅ TELEGRAM_BOT_TOKEN is present"
        fi
        if [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "❌ TELEGRAM_CHAT_ID is MISSING"
        else
          echo "✅ TELEGRAM_CHAT_ID is present"
        fi
        echo "==========================="

    - name: Run alerts
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python alerts.py
