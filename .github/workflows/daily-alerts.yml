name: Daily NGX Alerts

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  send-signals:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Debug Secrets
      run: |
        echo "Checking secrets..."
        if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then echo "❌ GCP_PROJECT_ID missing"; else echo "✅ GCP_PROJECT_ID present"; fi
        if [ -z "${{ secrets.GCP_PRIVATE_KEY }}" ]; then echo "❌ GCP_PRIVATE_KEY missing"; else echo "✅ GCP_PRIVATE_KEY present (length: ${#SECRETS_GCP_PRIVATE_KEY})"; fi
        if [ -z "${{ secrets.GCP_CLIENT_EMAIL }}" ]; then echo "❌ GCP_CLIENT_EMAIL missing"; else echo "✅ GCP_CLIENT_EMAIL present"; fi

    - name: Run alerts
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_PRIVATE_KEY_ID: ${{ secrets.GCP_PRIVATE_KEY_ID }}
        GCP_PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}
        GCP_CLIENT_EMAIL: ${{ secrets.GCP_CLIENT_EMAIL }}
        GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
        GCP_CLIENT_CERT_URL: ${{ secrets.GCP_CLIENT_CERT_URL }}
      run: python alerts.py
